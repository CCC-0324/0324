<!DOCTYPE html>
<html lang="zh-Hant"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Life v17-4 (SoA)</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: black;
    }
    canvas {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: none;
    }
  </style>
</head>
<body>
  <canvas id="particleCanvas" width="1000" height="620"></canvas>
  <script>
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');

    const CANVAS_WIDTH = canvas.width;
    const CANVAS_HEIGHT = canvas.height;
    const CANVAS_WIDTH_MINUS_EDGE = CANVAS_WIDTH - 5;
    const CANVAS_HEIGHT_MINUS_EDGE = CANVAS_HEIGHT - 5;
    const NEARBY_RADIUS_SQUARED = 100 * 100;
    const MIN_DISTANCE_SQUARED = 7 * 7;
    const MIN_DISTANCE_RIPPLE_SQUARED = 3 * 3;
    const CLUSTER_RADIUS_SQUARED = 50 * 50;
    const DARK_MATTER_RADIUS_SQUARED = 30 * 30;
    const PI2 = Math.PI * 2;

    const rippleTimestamps = new Map();
    const ripples = [];

    const COLORS = ['#2E4600','#486B00','#A2C523','#7D8427','#C9D787','#4E6E58','#6E8B3D','#99B898','#556B2F','#8E9775','#3B5323','#B4C292'];
    const COLOR_RGB = COLORS.map(hexToRgb);
    const TYPES = COLORS.length;

    const PARTICLE_COUNT = 6000;
    const MAX_FORCE = 0.2;
    const FRICTION = 0.68;
    const CHANGE_INTERVAL = 60000;
    const TRANSITION_DURATION = 30000;
    const REPULSION_STRENGTH = 0.5;

    // ===== SoA 粒子資料 =====
    // 用連續的 typed array 取代 3000 個物件：
    // CPU 快取命中率大幅提升，且完全沒有屬性查找與 GC 開銷
    const N = PARTICLE_COUNT;
    const posX = new Float32Array(N);
    const posY = new Float32Array(N);
    const velX = new Float32Array(N);
    const velY = new Float32Array(N);
    const pType = new Uint8Array(N);
    const pClustered = new Uint8Array(N);
    const pInRipple = new Uint8Array(N);

    for (let i = 0; i < N; i++) {
      posX[i] = Math.random() * CANVAS_WIDTH;
      posY[i] = Math.random() * CANVAS_HEIGHT;
      velX[i] = Math.random() * 2 - 1;
      velY[i] = Math.random() * 2 - 1;
      pType[i] = (Math.random() * TYPES) | 0;
    }

    // 依 type 排序的繪製順序（type 不會變，排序一次即可）
    const drawOrder = new Int32Array(N);
    for (let i = 0; i < N; i++) drawOrder[i] = i;
    drawOrder.sort((a, b) => pType[a] - pType[b]);

    // ===== 互動矩陣（攤平為一維）=====
    let lastChangeTime = Date.now();
    let transitionStartTime = Date.now();

    function generateInteractionMatrix() {
      const m = new Float32Array(TYPES * TYPES);
      for (let i = 0; i < m.length; i++) {
        m[i] = Math.random() * 2 * MAX_FORCE - MAX_FORCE;
      }
      return m;
    }

    let oldMatrix = generateInteractionMatrix();
    let newMatrix = generateInteractionMatrix();
    const INTERACTION_MATRIX = oldMatrix.slice();
    let isFullScreen = false;

    function easeInOutSine(t) {
      return -(Math.cos(Math.PI * t) - 1) / 2;
    }

    function updateInteractionMatrix() {
      let elapsed = Date.now() - transitionStartTime;
      let t = Math.min(elapsed / TRANSITION_DURATION, 1);
      let smoothT = easeInOutSine(t);

      for (let i = 0; i < INTERACTION_MATRIX.length; i++) {
        INTERACTION_MATRIX[i] = oldMatrix[i] * (1 - smoothT) + newMatrix[i] * smoothT;
      }

      if (t >= 1 && Date.now() - lastChangeTime > CHANGE_INTERVAL) {
        lastChangeTime = Date.now();
        transitionStartTime = Date.now();
        oldMatrix = newMatrix.slice();
        newMatrix = generateInteractionMatrix();
      }
    }

    function hexToRgb(hex) {
      hex = hex.replace(/^#/, '');
      let bigint = parseInt(hex, 16);
      let r = (bigint >> 16) & 255;
      let g = (bigint >> 8) & 255;
      let b = bigint & 255;
      return { r, g, b };
    }

    // ===== 空間網格（counting sort，零配置）=====
    // cellStarts[c]..cellStarts[c+1] 是 cellParticles 中屬於格子 c 的粒子索引區段，
    // 同格粒子在記憶體中連續，走訪時快取友善
    const GRID_SIZE = 50; // 粒子互動用 ±2 格（涵蓋 100px），叢集/暗物質用 ±1 格（涵蓋 50px）
    const GRID_WIDTH = Math.ceil(CANVAS_WIDTH / GRID_SIZE);
    const GRID_HEIGHT = Math.ceil(CANVAS_HEIGHT / GRID_SIZE);
    const NUM_CELLS = GRID_WIDTH * GRID_HEIGHT;

    const cellStarts = new Int32Array(NUM_CELLS + 1);
    const cellCursor = new Int32Array(NUM_CELLS);
    const cellParticles = new Int32Array(N);
    const particleCell = new Int32Array(N);

    function rebuildGrid() {
      cellStarts.fill(0);
      for (let i = 0; i < N; i++) {
        let gx = (posX[i] / GRID_SIZE) | 0;
        let gy = (posY[i] / GRID_SIZE) | 0;
        if (gx >= GRID_WIDTH) gx = GRID_WIDTH - 1;
        if (gy >= GRID_HEIGHT) gy = GRID_HEIGHT - 1;
        const c = gy * GRID_WIDTH + gx;
        particleCell[i] = c;
        cellStarts[c + 1]++;
      }
      for (let c = 0; c < NUM_CELLS; c++) {
        cellStarts[c + 1] += cellStarts[c];
        cellCursor[c] = cellStarts[c];
      }
      for (let i = 0; i < N; i++) {
        cellParticles[cellCursor[particleCell[i]]++] = i;
      }
    }

    // ===== 粒子物理更新（SoA 熱迴圈）=====
    function updateParticles() {
      for (let i = 0; i < N; i++) {
        const xi = posX[i], yi = posY[i];
        const rowBase = pType[i] * TYPES;
        const inRipple = pInRipple[i];
        const minD2 = inRipple ? MIN_DISTANCE_RIPPLE_SQUARED : MIN_DISTANCE_SQUARED;
        const minD = inRipple ? 3 : 7;
        let fx = 0, fy = 0;

        const gx = (xi / GRID_SIZE) | 0;
        const gy = (yi / GRID_SIZE) | 0;
        let xMin = gx - 2; if (xMin < 0) xMin = 0;
        let xMax = gx + 2; if (xMax > GRID_WIDTH - 1) xMax = GRID_WIDTH - 1;
        let yMin = gy - 2; if (yMin < 0) yMin = 0;
        let yMax = gy + 2; if (yMax > GRID_HEIGHT - 1) yMax = GRID_HEIGHT - 1;

        for (let cy = yMin; cy <= yMax; cy++) {
          const rowOffset = cy * GRID_WIDTH;
          for (let cx = xMin; cx <= xMax; cx++) {
            const c = rowOffset + cx;
            const end = cellStarts[c + 1];
            for (let s = cellStarts[c]; s < end; s++) {
              const j = cellParticles[s];
              if (j === i) continue;

              const dx = posX[j] - xi;
              const dy = posY[j] - yi;
              const d2 = dx * dx + dy * dy;

              if (d2 < minD2 && d2 > 0) {
                const dist = Math.sqrt(d2);
                const scale = REPULSION_STRENGTH * (1 - dist / minD) / dist;
                fx -= scale * dx;
                fy -= scale * dy;
              }
              else if (d2 < NEARBY_RADIUS_SQUARED && d2 > 0) {
                // 恆等式：force*(dx/dist) = (M/(0.1*dist))*(dx/dist) = 10*M*dx/d2
                let f = INTERACTION_MATRIX[rowBase + pType[j]] * 10 / d2;
                if (d2 < 400) f *= -0.2;        // dist < 20
                else if (d2 < 2500) f *= 2;     // dist < 50
                fx += f * dx;
                fy += f * dy;
              }
            }
          }
        }

        let vx = (velX[i] + fx) * FRICTION;
        let vy = (velY[i] + fy) * FRICTION;
        let x = xi + vx;
        let y = yi + vy;

        if (x < 0) {
          x = 0;
          vx = Math.abs(vx) < 0.5 ? 0.5 : Math.abs(vx);
        } else if (x > CANVAS_WIDTH) {
          x = CANVAS_WIDTH;
          vx = Math.abs(vx) < 0.5 ? -0.5 : -Math.abs(vx);
        }

        if (y < 0) {
          y = 0;
          vy = Math.abs(vy) < 0.5 ? 0.5 : Math.abs(vy);
        } else if (y > CANVAS_HEIGHT) {
          y = CANVAS_HEIGHT;
          vy = Math.abs(vy) < 0.5 ? -0.5 : -Math.abs(vy);
        }

        if (x < 5) vx += 5;
        else if (x > CANVAS_WIDTH_MINUS_EDGE) vx -= 5;
        if (y < 5) vy += 5;
        else if (y > CANVAS_HEIGHT_MINUS_EDGE) vy -= 5;

        posX[i] = x;
        posY[i] = y;
        velX[i] = vx;
        velY[i] = vy;
      }
    }

    // ===== 暗物質粒子（數量極少，保留 class，直接讀寫 SoA 陣列）=====
    class DarkMatterParticle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 20;
        this.vy = (Math.random() - 0.5) * 20;
        this.color = "#000000";
        this.radius = 2;
        this.lifetime = 5000;
        this.activeTime = 2000;
        this.creationTime = Date.now();
      }

      update() {
        this.vx += (Math.random() - 0.5) * 10;
        this.vy += (Math.random() - 0.5) * 10;
        this.vx = Math.max(-10, Math.min(10, this.vx));
        this.vy = Math.max(-10, Math.min(10, this.vy));
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0) this.x = 0, this.vx *= -1;
        if (this.x > CANVAS_WIDTH) this.x = CANVAS_WIDTH, this.vx *= -1;
        if (this.y < 0) this.y = 0, this.vy *= -1;
        if (this.y > CANVAS_HEIGHT) this.y = CANVAS_HEIGHT, this.vy *= -1;

        let age = Date.now() - this.creationTime;
        if (age < this.activeTime) return;

        let timeFactor = Math.exp((age - this.activeTime) / 1000) - 1;
        const repulsion = 1 + timeFactor * 10;

        const gx = (this.x / GRID_SIZE) | 0;
        const gy = (this.y / GRID_SIZE) | 0;
        let xMin = gx - 1; if (xMin < 0) xMin = 0;
        let xMax = gx + 1; if (xMax > GRID_WIDTH - 1) xMax = GRID_WIDTH - 1;
        let yMin = gy - 1; if (yMin < 0) yMin = 0;
        let yMax = gy + 1; if (yMax > GRID_HEIGHT - 1) yMax = GRID_HEIGHT - 1;

        for (let cy = yMin; cy <= yMax; cy++) {
          const rowOffset = cy * GRID_WIDTH;
          for (let cx = xMin; cx <= xMax; cx++) {
            const c = rowOffset + cx;
            const end = cellStarts[c + 1];
            for (let s = cellStarts[c]; s < end; s++) {
              const j = cellParticles[s];
              const dx = posX[j] - this.x;
              const dy = posY[j] - this.y;
              const d2 = dx * dx + dy * dy;

              if (d2 < DARK_MATTER_RADIUS_SQUARED && d2 > 0.01) {
                const dist = Math.sqrt(d2);
                const s2 = repulsion / dist;
                velX[j] += s2 * dx;
                velY[j] += s2 * dy;
              }
            }
          }
        }
      }

      isExpired() {
        return Date.now() - this.creationTime > this.lifetime;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, PI2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    const darkMatterParticles = [];

    // ===== 叢集偵測（可重用緩衝，無 Set / 無配置）=====
    const clusterProcessed = new Uint8Array(N);
    const clusterMembers = new Int32Array(N);

    function updateClusters() {
      pClustered.fill(0);
      clusterProcessed.fill(0);
      const clusters = [];

      for (let i = 0; i < N; i++) {
        if (clusterProcessed[i]) continue;

        const xi = posX[i], yi = posY[i];
        let memberCount = 0;
        clusterMembers[memberCount++] = i;
        clusterProcessed[i] = 1;

        // 叢集半徑 50 = GRID_SIZE，±1 格保證完整覆蓋
        const gx = (xi / GRID_SIZE) | 0;
        const gy = (yi / GRID_SIZE) | 0;
        let xMin = gx - 1; if (xMin < 0) xMin = 0;
        let xMax = gx + 1; if (xMax > GRID_WIDTH - 1) xMax = GRID_WIDTH - 1;
        let yMin = gy - 1; if (yMin < 0) yMin = 0;
        let yMax = gy + 1; if (yMax > GRID_HEIGHT - 1) yMax = GRID_HEIGHT - 1;

        for (let cy = yMin; cy <= yMax; cy++) {
          const rowOffset = cy * GRID_WIDTH;
          for (let cx = xMin; cx <= xMax; cx++) {
            const c = rowOffset + cx;
            const end = cellStarts[c + 1];
            for (let s = cellStarts[c]; s < end; s++) {
              const j = cellParticles[s];
              if (clusterProcessed[j]) continue;

              const dx = posX[j] - xi;
              const dy = posY[j] - yi;

              if (dx * dx + dy * dy < CLUSTER_RADIUS_SQUARED) {
                clusterMembers[memberCount++] = j;
                clusterProcessed[j] = 1;
              }
            }
          }
        }

        if (memberCount >= 300) {
          let centerX = 0, centerY = 0;
          for (let m = 0; m < memberCount; m++) {
            const idx = clusterMembers[m];
            pClustered[idx] = 1;
            centerX += posX[idx];
            centerY += posY[idx];
          }
          centerX /= memberCount;
          centerY /= memberCount;

          clusters.push({
            x: centerX,
            y: centerY,
            id: `cluster-${clusters.length}`
          });
        }
      }

      return clusters;
    }

    class Ripple {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 0;
        this.maxRadius = 300;
        this.opacity = 0.2;
        this.speed = 2;
        this.isActive = true;
      }

      update() {
        this.radius += this.speed;
        this.opacity = 0.8 * (1 - this.radius / this.maxRadius);
        this.isActive = this.opacity > 0;
        return this.opacity > 0;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, PI2);
        ctx.strokeStyle = `rgba(20, 20, 20, ${this.opacity})`;
        ctx.lineWidth = 3;
        ctx.stroke();
      }
    }

    // 叢集偵測降頻：漣漪本來就是 5 秒一次，每 500ms 偵測一次綽綽有餘
    let cachedClusters = [];
    let lastClusterCheckTime = 0;
    const CLUSTER_CHECK_INTERVAL = 500;

    function updateRipples() {
      const now = Date.now();

      if (now - lastClusterCheckTime >= CLUSTER_CHECK_INTERVAL) {
        lastClusterCheckTime = now;
        cachedClusters = updateClusters();
      }

      for (const cluster of cachedClusters) {
        const lastRippleTime = rippleTimestamps.get(cluster.id) || 0;

        if (now - lastRippleTime >= 5000) {
          ripples.push(new Ripple(cluster.x, cluster.y));
          rippleTimestamps.set(cluster.id, now);

          if (Math.random() < 0.05) {
            darkMatterParticles.push(new DarkMatterParticle(cluster.x, cluster.y));
          }
        }
      }

      for (let i = ripples.length - 1; i >= 0; i--) {
        if (!ripples[i].update()) {
          ripples.splice(i, 1);
        }
      }
    }

    function drawRipples() {
      for (const ripple of ripples) {
        ripple.draw();
      }
    }

    function markRippleParticles() {
      pInRipple.fill(0);
      for (const ripple of ripples) {
        if (!ripple.isActive) continue;

        const r2 = ripple.radius * ripple.radius;
        const rx = ripple.x, ry = ripple.y;
        for (let i = 0; i < N; i++) {
          const dx = posX[i] - rx;
          const dy = posY[i] - ry;
          if (dx * dx + dy * dy <= r2) pInRipple[i] = 1;
        }
      }
    }

    // ===== 批次繪製 =====
    function drawParticles() {
      // 閃爍 alpha 是全域同步的，每幀計算一次即可
      const blink = 0.5 + 0.5 * Math.sin(PI2 * Date.now() / 1000);
      const alpha = 0.3 + 0.2 * blink;

      // 第一遍：clustered 光暈（先畫，讓粒子本體疊在上面）
      let lastType = -1;
      for (let k = 0; k < N; k++) {
        const i = drawOrder[k];
        if (!pClustered[i]) continue;
        const t = pType[i];
        if (t !== lastType) {
          lastType = t;
          const rgb = COLOR_RGB[t];
          ctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
        }
        ctx.fillRect(posX[i] - 1.5, posY[i] - 1.5, 3, 3);
      }

      // 第二遍：粒子本體（radius=1 的圓改用 2x2 方塊，肉眼幾乎無差）
      lastType = -1;
      for (let k = 0; k < N; k++) {
        const i = drawOrder[k];
        const t = pType[i];
        if (t !== lastType) {
          lastType = t;
          ctx.fillStyle = COLORS[t];
        }
        ctx.fillRect(posX[i] - 1, posY[i] - 1, 2, 2);
      }
    }

    function animate() {
      ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      updateInteractionMatrix();

      rebuildGrid();
      markRippleParticles();
      updateParticles();

      updateRipples();
      drawRipples();

      drawParticles();

      for (let i = darkMatterParticles.length - 1; i >= 0; i--) {
        darkMatterParticles[i].update();
        if (darkMatterParticles[i].isExpired()) {
          darkMatterParticles.splice(i, 1);
        }
      }

      for (let dmp of darkMatterParticles) {
        dmp.draw();
      }

      requestAnimationFrame(animate);
    }

    animate();

    canvas.addEventListener('click', () => {
      if (isFullScreen) {
        document.exitFullscreen();
        isFullScreen = false;
      } else {
        document.documentElement.requestFullscreen();
        isFullScreen = true;
      }
    });
  </script>


</body></html>
