<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Quantum Sands - Revised</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1e3a5f;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100vh; overflow:hidden;
  font-family:'Segoe UI', Arial, sans-serif;
}
canvas {
  display:block;
  width:100vw; height:100vh;
  object-fit:contain;
  image-rendering:pixelated;
}
#hud {
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  color:#fff; font-size:13px; background:rgba(0,0,0,0.55);
  padding:6px 18px; border-radius:20px; white-space:nowrap;
  user-select:none; pointer-events:none;
}
#seed-input-box {
  position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.7); border-radius:12px;
  padding:10px 18px; display:flex; gap:10px; align-items:center;
}
#seed-input-box input {
  background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.4);
  color:#fff; font-family:monospace; font-size:14px; font-weight:bold;
  padding:4px 10px; border-radius:8px; width:110px; text-transform:uppercase;
  letter-spacing:2px; text-align:center;
}
#seed-input-box button {
  background:#3b82f6; color:#fff; border:none; border-radius:8px;
  font-size:12px; padding:5px 12px; cursor:pointer;
}
#legend {
  position:absolute; bottom:20px; left:160px;
  background:rgba(10,25,50,0.82);
  border-radius:10px; padding:10px 14px;
  border:1px solid rgba(255,255,255,0.10);
  user-select:none; pointer-events:none;
}
#legend .leg-item {
  display:flex; align-items:center; gap:8px;
  margin:3px 0; font-size:12px; color:#e8eef5;
}
#legend .leg-swatch {
  width:14px; height:14px; border-radius:2px; flex-shrink:0;
  border:1px solid rgba(255,255,255,0.25);
}
#transition-modal {
  display: none;
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(10, 25, 50, 0.95);
  border: 2px solid rgba(255, 255, 255, 0.2);
  padding: 25px 40px; border-radius: 12px;
  text-align: center; color: #fff; z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
#transition-modal p { margin-bottom: 20px; font-size: 16px; font-weight: bold; letter-spacing: 1px; }
.modal-btn-container { display: flex; gap: 15px; justify-content: center; }
.modal-btn {
  background: #3b82f6; color: #fff; border: none; border-radius: 8px;
  font-size: 14px; padding: 8px 20px; cursor: pointer; font-weight: bold;
  transition: background 0.2s;
}
.modal-btn:hover { background: #2563eb; }
.modal-btn.cancel { background: #64748b; }
.modal-btn.cancel:hover { background: #475569; }
</style>
</head>
<body>
<div id="hud">🎮 WASD / 方向鍵 / 點擊地圖 移動</div>
<canvas id="gameCanvas"></canvas>

<div id="legend">
  <div class="leg-item"><div class="leg-swatch" style="background:#0b2f52"></div>深層海</div>
  <div class="leg-item"><div class="leg-swatch" style="background:#38bdf8"></div>淺層海</div>
  <div class="leg-item"><div class="leg-swatch" style="background:#f5dfa0"></div>沙灘</div>
  <div class="leg-item"><div class="leg-swatch" style="background:#5cd67a"></div>草地</div>
  <div class="leg-item"><div class="leg-swatch" style="background:#c8cdd4"></div>石地</div>
</div>

<div id="seed-input-box">
  <label style="color:#fff; font-size:12px;">輸入種子碼:</label>
  <input id="seed-input" maxlength="5" placeholder="XXXXX" />
  <button onclick="applySeed()">套用</button>
  <button onclick="randomSeed()">隨機</button>
</div>

<div id="transition-modal">
  <p>是否穿越至下張地圖？</p>
  <div class="modal-btn-container">
    <button id="btn-yes" class="modal-btn">是</button>
    <button id="btn-no" class="modal-btn cancel">暫時不要</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width  = 1280;
canvas.height = 720;

const playerSprite = new Image();
playerSprite.src = 'savage.png';
const SPRITE_COLUMNS = 4, SPRITE_ROWS = 4;
let SPRITE_FRAME_W = 0, SPRITE_FRAME_H = 0;
playerSprite.onload = () => {
  SPRITE_FRAME_W = playerSprite.naturalWidth  / SPRITE_COLUMNS;
  SPRITE_FRAME_H = playerSprite.naturalHeight / SPRITE_ROWS;
};

const ROWS = 18, COLS = 20;
const TW = 56, TH = 28, HW = TW/2, HH = TH/2;
const ELEV = { '-1':10, '0':10, '1':10, '2':20, '3':30 };
const BASE_BOTTOM = 1;

function getThick(type) { return BASE_BOTTOM + (ELEV[String(type)] ?? 0); }

const COLOR = {
  '-1': { top:'#0b2f52', left:'#061c33', right:'#092540' },
   '0': { top:'#38bdf8', left:'#0369a1', right:'#0284c7' },
   '1': { top:'#f5dfa0', left:'#b5935a', right:'#d4aa6a' },
   '2': { top:'#5cd67a', left:'#1a7a35', right:'#22a048' },
   '3': { top:'#c8cdd4', left:'#5a6070', right:'#8a909a' },
};

let MAP = [];
let currentSeed = '';

const footprints = [];
let footprintBudget = 0;
let stepFoot = 0;
const FOOTPRINT_FADE_MS = 1500;
const FOOTPRINT_COUNT   = 7;

function footOffset(dir, foot) {
  const side = foot === 0 ? -1 : 1;
  switch (dir) {
    case 0: return { ox: side * 4,  oy:  side * 2  };
    case 1: return { ox: side * 4,  oy: -side * 2  };
    case 2: return { ox: -side * 4, oy: -side * 2  };
    case 3: return { ox: -side * 4, oy:  side * 2  };
    default: return { ox: 0, oy: 0 };
  }
}

function addFootprint(gx, gy, foot, dir) {
  const type = tileAt(gx, gy);
  if (type < 1) return;
  footprints.push({
    gx, gy, foot, dir, type,
    alpha: 0.70,
    born: performance.now(),
    maxLifetime: FOOTPRINT_FADE_MS * (0.85 + Math.random() * 0.30)
  });
}

function updateFootprints(now) {
  for (let i = footprints.length - 1; i >= 0; i--) {
    const fp = footprints[i];
    const elapsed = now - fp.born;
    const fadeStart = fp.maxLifetime * 0.30;
    if (elapsed >= fp.maxLifetime) {
      footprints.splice(i, 1);
    } else if (elapsed > fadeStart) {
      fp.alpha = 0.70 * (1 - (elapsed - fadeStart) / (fp.maxLifetime - fadeStart));
    }
  }
}

function drawFootprint(fp) {
  const type = tileAt(fp.gx, fp.gy);
  if (type < 1) return;
  const p = toScreen(fp.gx, fp.gy, type);
  const { ox, oy } = footOffset(fp.dir, fp.foot);

  let r = 80, g = 120, b = 160;
  if (type === 1) { r = 155; g = 130; b = 90;  }
  if (type === 2) { r = 55;  g = 95;  b = 75;  }
  if (type === 3) { r = 95;  g = 105; b = 125; }

  ctx.save();
  ctx.globalAlpha = fp.alpha;
  ctx.translate(p.x + ox, p.y + oy - 4);
  const isoAngle = Math.atan2(HH, HW);
  const rotDir = (fp.dir === 0 || fp.dir === 1) ? 1 : -1;
  ctx.rotate(rotDir * isoAngle * 0.5);

  ctx.beginPath();
  ctx.ellipse(0, 0, 6, 3.2, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fill();
  ctx.restore();
}

function drawFootprints(gx, gy) {
  for (const fp of footprints) {
    if (fp.gx === gx && fp.gy === gy) drawFootprint(fp);
  }
}

const ripples = [];
const RIPPLE_DURATION = 3000;

function addRipple(gx, gy) {
  const p = toScreen(gx, gy, 0);
  ripples.push({
    x: p.x,
    y: p.y,
    born: performance.now(),
    duration: RIPPLE_DURATION * (0.8 + Math.random() * 0.4)
  });
}

function updateRipples(now) {
  for (let i = ripples.length - 1; i >= 0; i--) {
    if (now - ripples[i].born >= ripples[i].duration) ripples.splice(i, 1);
  }
}

function drawRipplesAt(gx, gy, p) {
  const now = performance.now();
  if (ripples.length === 0) return;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - HH);
  ctx.lineTo(p.x + HW, p.y);
  ctx.lineTo(p.x, p.y + HH);
  ctx.lineTo(p.x - HW, p.y);
  ctx.closePath();
  ctx.clip();

  for (const rp of ripples) {
    const distSq = (rp.x - p.x)**2 + (rp.y - p.y)**2;
    if (distSq > 5000) continue; 

    const t = (now - rp.born) / rp.duration;  
    if (t < 0 || t >= 1) continue;

    const maxRx = HW * 2.2;
    const maxRy = HH * 2.2;
    const rx = maxRx * t;
    const ry = maxRy * t;
    const alpha = 0.55 * (1 - t) * (1 - t);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = 'rgba(180, 230, 255, 1)';
    ctx.lineWidth = 1.2 * (1 - t * 0.5);
    ctx.beginPath();
    ctx.ellipse(rp.x, rp.y, rx, ry, 0, 0, Math.PI * 2);
    ctx.stroke();

    if (t > 0.15) {
      const t2 = (t - 0.15) / 0.85;
      const rx2 = maxRx * t2 * 0.6;
      const ry2 = maxRy * t2 * 0.6;
      ctx.globalAlpha = alpha * 0.6;
      ctx.lineWidth = 0.8 * (1 - t2 * 0.5);
      ctx.beginPath();
      ctx.ellipse(rp.x, rp.y, rx2, ry2, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.restore();
}

const splashDrops = [];

function addSplash(gx, gy) {
  const p = toScreen(gx, gy, -1);
  const count = 1 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3.5;
    const vx = Math.cos(angle) * speed * 0.7;
    const vy = Math.sin(angle) * speed * 0.35 - (2.5 + Math.random() * 3.5);
    splashDrops.push({
      gx, gy,
      x: p.x + (Math.random() - 0.5) * 12,
      y: p.y + (Math.random() - 0.5) * 6,
      vx, vy,
      gravity: 0.18 + Math.random() * 0.10,
      r: 1.2 + Math.random() * 2.0,
      alpha: 0.85 + Math.random() * 0.15,
      born: performance.now(),
      life: 500 + Math.random() * 400,
      isLanding: false
    });
  }
  splashDrops.push({
    gx, gy,
    x: p.x, y: p.y,
    vx: 0, vy: 0,
    gravity: 0,
    r: 0,
    alpha: 0.7,
    born: performance.now(),
    life: 350,
    isCrown: true,
    maxR: 14
  });
}

function updateSplashDrops(now) {
  for (let i = splashDrops.length - 1; i >= 0; i--) {
    const d = splashDrops[i];
    const elapsed = now - d.born;
    if (elapsed >= d.life) { splashDrops.splice(i, 1); continue; }
    if (!d.isCrown) {
      d.x += d.vx;
      d.y += d.vy;
      d.vy += d.gravity;
      d.alpha = 0.85 * (1 - elapsed / d.life);
    } else {
      d.r = d.maxR * (elapsed / d.life);
      d.alpha = 0.7 * (1 - elapsed / d.life);
    }
  }
}

function drawSplashDropsAt(gx, gy) {
  for (const d of splashDrops) {
    if (d.gx !== gx || d.gy !== gy) continue;
    ctx.save();
    ctx.globalAlpha = Math.max(0, d.alpha);
    if (d.isCrown) {
      ctx.strokeStyle = 'rgba(140, 210, 255, 1)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.r, d.r * 0.45, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(160, 220, 255, 1)';
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.r, d.r * 0.65, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

const bodyDroplets = [];
let bodyDripActive = false;
let bodyDripUntil = 0;
let bodyDripIntensity = 0; 

function startBodyDrip(intensity) {
  bodyDripActive = true;
  bodyDripUntil = performance.now() + (300 + Math.random() * 100);
  bodyDripIntensity = intensity;
}

function updateBodyDroplets(now) {
  if (bodyDripActive && now < bodyDripUntil) {
    const remaining = (bodyDripUntil - now) / 1800;
    const spawnRate = Math.ceil(bodyDripIntensity * remaining * 3);
    if (player.frame % Math.max(1, 4 - spawnRate) === 0) {
      const rGx = Math.round(player.gx), rGy = Math.round(player.gy);
      const type = tileAt(rGx, rGy);
      const p = toScreen(player.gx, player.gy, type);
      const dw = 10;
      const spot = { ox: (Math.random() - 0.5) * dw * 0.4, oy: -12 + Math.random() * 6  };
      bodyDroplets.push({
        x: p.x + spot.ox,
        y: p.y + spot.oy,
        vy: 0.3 + Math.random() * 0.5,
        vx: (Math.random() - 0.5) * 0.3,
        r: 1.0 + Math.random() * 1.5,
        alpha: 0.7 + Math.random() * 0.3,
        born: now,
        life: 400 + Math.random() * 300,
        streakLen: 2 + Math.random() * 4
      });
    }
  } else if (now >= bodyDripUntil) {
    bodyDripActive = false;
  }

  for (let i = bodyDroplets.length - 1; i >= 0; i--) {
    const d = bodyDroplets[i];
    const elapsed = now - d.born;
    if (elapsed >= d.life) { bodyDroplets.splice(i, 1); continue; }
    d.x += d.vx;
    d.y += d.vy;
    d.vy += 0.08;
    d.alpha = 0.7 * (1 - elapsed / d.life);
  }
}

function drawBodyDroplets() {
  for (const d of bodyDroplets) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, d.alpha);
    const speed = d.vy;
    const stretchY = Math.min(d.streakLen, speed * 2.5);
    ctx.fillStyle = 'rgba(180, 230, 255, 0.9)';
    ctx.strokeStyle = 'rgba(120, 190, 240, 0.6)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.ellipse(d.x, d.y, d.r * 0.6, d.r + stretchY * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
}

const surfaceBubbles = [];
function updateSurfaceBubbles() {
  const now = performance.now();
  for (let i = surfaceBubbles.length - 1; i >= 0; i--) {
    const b = surfaceBubbles[i];
    const elapsed = now - b.born;
    if (elapsed > b.life) {
      surfaceBubbles.splice(i, 1);
    } else {
      b.oy -= 0.15; 
      b.alpha = 1 - (elapsed / b.life);
    }
  }
}

function drawSurfaceBubblesAt(gx, gy, p) {
  for (const b of surfaceBubbles) {
    if (b.gx === gx && b.gy === gy) {
      ctx.save();
      ctx.globalAlpha = b.alpha * 0.6;
      ctx.fillStyle = "#fff";
      ctx.strokeStyle = "rgba(255,255,255,0.8)";
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.arc(p.x + b.ox, p.y + b.oy, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════════════════════
// 🐟 淺海魚群系統 (修正：僅在非交界區活動)
// ═══════════════════════════════════════════════════════
const fishes = [];
const FISH_FLEE_DIST_SQ = 3.5 * 3.5; 
const FISH_NORMAL_SPEED = 0.006;      
const FISH_FLEE_SPEED   = 0.085;      
const FISH_DIVE_INTERVAL_MIN = 4000;  
const FISH_DIVE_INTERVAL_MAX = 9000;
const FISH_DIVE_DURATION_MIN = 2000;
const FISH_DIVE_DURATION_MAX = 5000;
const FISH_MAX_COUNT = 12;

// 判斷是否為淺海交界
function isShallowBorder(gx, gy) {
  if (tileAt(gx, gy) !== 0) return false;
  const neighbors = [
    tileAt(gx + 1, gy), tileAt(gx - 1, gy),
    tileAt(gx, gy + 1), tileAt(gx, gy - 1)
  ];
  return neighbors.some(t => t !== 0);
}

function spawnFishesOnMap() {
  fishes.length = 0;
  const shallowTiles = [];
  for (let gy = 0; gy < ROWS; gy++)
    for (let gx = 0; gx < COLS; gx++)
      // 修正：必須是淺海且非交界
      if (MAP[gy][gx] === 0 && !isShallowBorder(gx, gy)) shallowTiles.push({gx, gy});
  
  const count = Math.min(FISH_MAX_COUNT, Math.floor(shallowTiles.length * 0.05));
  for (let i = 0; i < count; i++) {
    const tile = shallowTiles[Math.floor(Math.random() * shallowTiles.length)];
    const angle = Math.random() * Math.PI * 2;
    const now = performance.now();
    fishes.push({
      gx: tile.gx + (Math.random() - 0.5) * 0.7,
      gy: tile.gy + (Math.random() - 0.5) * 0.7,
      angle: angle, targetAngle: angle,
      speed: FISH_NORMAL_SPEED, fleeing: false, vanishing: false,
      diving: false, diveAlpha: 0,
      nextDiveAt: now + FISH_DIVE_INTERVAL_MIN + Math.random() * (FISH_DIVE_INTERVAL_MAX - FISH_DIVE_INTERVAL_MIN),
      diveEndAt: 0,
      bodyLen: 8 + Math.random() * 4, bodyW: 3 + Math.random() * 1.5,
      hue: 195 + Math.random() * 5, turnAt: now + 1000 + Math.random() * 2000,
    });
  }
}

function updateFishes(now) {
  for (let i = fishes.length - 1; i >= 0; i--) {
    const f = fishes[i];

    if (f.vanishing) {
      f.diveAlpha -= 0.1;
      if (f.diveAlpha <= 0) {
        fishes.splice(i, 1);
        // 補生至合格區域
        const shallowTiles = [];
        for (let gy = 0; gy < ROWS; gy++)
          for (let gx = 0; gx < COLS; gx++)
            if (MAP[gy][gx] === 0 && !isShallowBorder(gx, gy)) shallowTiles.push({gx, gy});
        if (shallowTiles.length > 0) {
          const tile = shallowTiles[Math.floor(Math.random() * shallowTiles.length)];
          const angle = Math.random() * Math.PI * 2;
          fishes.push({
            gx: tile.gx + (Math.random() - 0.5) * 0.7, gy: tile.gy + (Math.random() - 0.5) * 0.7,
            angle, targetAngle: angle, speed: FISH_NORMAL_SPEED, fleeing: false, vanishing: false,
            diving: false, diveAlpha: 0,
            nextDiveAt: now + FISH_DIVE_INTERVAL_MIN + Math.random() * (FISH_DIVE_INTERVAL_MAX - FISH_DIVE_INTERVAL_MIN),
            diveEndAt: 0,
            bodyLen: 5 + Math.random() * 4, bodyW: 2 + Math.random() * 1.5,
            hue: 195 + Math.random() * 5, turnAt: now + 1000 + Math.random() * 2000,
          });
        }
      }
      continue;
    }

    const dx = f.gx - player.gx, dy = f.gy - player.gy;
    const distSq = dx * dx + dy * dy;

    if (distSq < FISH_FLEE_DIST_SQ) {
      f.fleeing = true; f.targetAngle = Math.atan2(dy, dx); f.speed = FISH_FLEE_SPEED;
    } else {
      f.fleeing = false; f.speed = FISH_NORMAL_SPEED;
      if (now > f.turnAt) {
        f.targetAngle = f.angle + (Math.random() - 0.5) * Math.PI * 1.2;
        f.turnAt = now + 1500 + Math.random() * 3000;
      }
    }

    let da = f.targetAngle - f.angle;
    while (da >  Math.PI) da -= Math.PI * 2;
    while (da < -Math.PI) da += Math.PI * 2;
    f.angle += da * (f.fleeing ? 0.25 : 0.04);

    const nx = f.gx + Math.cos(f.angle) * f.speed;
    const ny = f.gy + Math.sin(f.angle) * f.speed;
    const tx = Math.round(nx), ty = Math.round(ny);
    const tileCheck = tileAt(tx, ty);
    const isBorder = isShallowBorder(tx, ty);

    // 修正：若前進方向非淺海或屬交界區
    if (tileCheck === 0 && !isBorder) {
      f.gx = nx; f.gy = ny;
    } else {
      if (f.fleeing) {
        f.vanishing = true; // 逃跑時碰到交界直接消失
      } else {
        f.targetAngle = f.angle + Math.PI + (Math.random() - 0.5) * 0.8;
        f.turnAt = now + 200;
      }
    }

    // 潛水邏輯
    if (!f.diving && now > f.nextDiveAt && !f.fleeing) {
      f.diving = true;
      f.diveEndAt = now + FISH_DIVE_DURATION_MIN + Math.random() * (FISH_DIVE_DURATION_MAX - FISH_DIVE_DURATION_MIN);
    }
    if (f.diving) {
      if (f.fleeing) {
        f.diving = false; f.diveAlpha = 1.0;
        f.nextDiveAt = now + FISH_DIVE_INTERVAL_MIN + Math.random() * (FISH_DIVE_INTERVAL_MAX - FISH_DIVE_INTERVAL_MIN);
      } else if (now > f.diveEndAt) {
        f.diving = false; f.diveAlpha = 1.0;
        f.nextDiveAt = now + FISH_DIVE_INTERVAL_MIN + Math.random() * (FISH_DIVE_INTERVAL_MAX - FISH_DIVE_INTERVAL_MIN);
      } else {
        f.diveAlpha = Math.max(0.18, f.diveAlpha - 0.008);
      }
    } else {
      f.diveAlpha = Math.min(1.0, f.diveAlpha + 0.005);
    }
  }
}

function drawAllFishes() {
  const sorted = fishes.slice().sort((a, b) => (a.gx + a.gy) - (b.gx + b.gy));
  for (const f of sorted) {
    if (tileAt(Math.round(f.gx), Math.round(f.gy)) !== 0) continue;
    const p = toScreen(f.gx, f.gy, 0);
    const cosA = Math.cos(f.angle), sinA = Math.sin(f.angle);
    const sdx = (cosA - sinA) * HW, sdy = (cosA + sinA) * HH;
    const len = Math.sqrt(sdx * sdx + sdy * sdy) || 1;
    const ux = sdx/len, uy = sdy/len, px = -uy, py = ux;
    const BL = f.bodyLen, BW = f.bodyW;

    ctx.save();
    ctx.globalAlpha = f.diveAlpha * 0.88;
    ctx.fillStyle = `hsla(${f.hue}, 70%, 40%, ${f.diveAlpha})`;
    ctx.strokeStyle = `hsla(${f.hue}, 55%, 50%, ${f.diveAlpha * 0.8})`;
    ctx.lineWidth = 0.6;

    const hx = p.x + ux * BL * 0.5, hy = p.y + uy * BL * 0.5;
    const tx = p.x - ux * BL * 0.5, ty = p.y - uy * BL * 0.5;

    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.bezierCurveTo(hx + px * BW, hy + py * BW, tx + px * BW * 0.6, ty + py * BW * 0.6, tx, ty);
    ctx.bezierCurveTo(tx - px * BW * 0.6, ty - py * BW * 0.6, hx - px * BW, hy - py * BW, hx, hy);
    ctx.fill(); ctx.stroke();

    const fx1 = tx + px * BW * 0.5 - ux * BL * 0.35, fy1 = ty + py * BW * 0.5 - uy * BL * 0.35;
    const fx2 = tx - px * BW * 1.4 - ux * BL * 0.35, fy2 = ty - py * BW * 1.4 - uy * BL * 0.35;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(fx1, fy1); ctx.lineTo(fx2, fy2); ctx.closePath();
    ctx.fillStyle = `hsla(${f.hue + 10}, 60%, 60%, ${f.diveAlpha * 0.85})`;
    ctx.fill();
    ctx.restore();
  }
}

let pebblesCache = null;
function buildPebbles() {
  pebblesCache = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  const mapSeedNum = seedFromString(currentSeed);
  for (let gy = 0; gy < ROWS; gy++) {
    for (let gx = 0; gx < COLS; gx++) {
      if (MAP[gy][gx] !== 3) continue;
      let h = (gx * 374761393 + gy * 668265263 + mapSeedNum) | 0;
      h = Math.imul(h ^ (h >>> 13), 1274126177); h = h ^ (h >>> 16);
      if ((Math.abs(h) % 100) >= 5) continue;
      const count = 1 + (Math.abs(h) % 3), stones = [];
      for (let k = 0; k < count; k++) {
        let hk = Math.abs(Math.imul((Math.abs(h) + k * 1299709) ^ ((Math.abs(h) + k) >>> 7), 2246822519));
        const rx = (hk % 26) - 13, ry = ((hk * 7) % 14) - 7;
        const hk2 = Math.abs(Math.imul(hk ^ (hk >>> 9), 374761393));
        const sRx = 3.5 + (hk2 % 5) * 0.8, sRy = sRx * (0.5 + (hk2 % 4) * 0.1);      
        stones.push({ rx, ry, sRx, sRy, angle: (hk2 % 360) * Math.PI / 180, shade: 140 + (Math.abs(h) % 30) });
      }
      pebblesCache[gy][gx] = stones;
    }
  }
}

function drawPebbles(gx, gy, p) {
  if (!pebblesCache) return;
  const stones = pebblesCache[gy]?.[gx];
  if (!stones) return;
  for (const s of stones) {
    ctx.save(); ctx.translate(p.x + s.rx, p.y + s.ry); ctx.rotate(s.angle);
    ctx.beginPath(); ctx.ellipse(1, 1.5, s.sRx, s.sRy, 0, 0, Math.PI * 2); ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, 0, s.sRx, s.sRy, 0, 0, Math.PI * 2); ctx.fillStyle = `rgb(${s.shade}, ${s.shade + 2}, ${s.shade + 6})`; ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// ④ 草地踩壓系統（劇烈搖晃版）
// ═══════════════════════════════════════════════════════
const trampledGrass = new Map();
const GRASS_SHAKE_DUR = 800;   // 搖晃持續時間 ms

function trampleGrass(gx, gy, dir) {
  if (tileAt(gx, gy) !== 2) return;
  trampledGrass.set(`${gx},${gy}`, { trampledAt: performance.now() });
}

function grassShakeIntensity(gx, gy) {
  const key = `${gx},${gy}`;
  if (!trampledGrass.has(key)) return 0;
  const { trampledAt } = trampledGrass.get(key);
  const elapsed = performance.now() - trampledAt;
  if (elapsed >= GRASS_SHAKE_DUR) { trampledGrass.delete(key); return 0; }
  // 先快速衝到最大強度，再逐漸衰退
  const t = elapsed / GRASS_SHAKE_DUR;
  return (1 - t) * (1 - t);
}

function drawGrassOnTile(gx, gy, p) {
  const mapSeedNum = seedFromString(currentSeed);
  let h = (gx * 374761393 + gy * 668265263 + mapSeedNum) | 0;
  h = Math.imul(h ^ (h >>> 13), 12741261); h = h ^ (h >>> 16);
  const clusterHash = Math.abs(h);
  if ((clusterHash % 100) >= 20) return;

  const shakeAmt = grassShakeIntensity(gx, gy);
  // 正常風速 + 踩踏時疊加高頻不規則搖晃
  const baseWind = Math.sin(wavePhase + gx * 0.5 + gy * 0.3) * 1.0;
  const count = 8 + (clusterHash % 3);

  ctx.lineCap = 'round';
  for (let i = 0; i < count; i++) {
    const subSeed = (clusterHash >> i) + i;
    const rx = (subSeed % 26) - 13;
    const ry = ((subSeed * 7) % 14) - 7;
    const px = p.x + rx;
    const py = p.y + ry;

    const h1 = 3 + (subSeed % 3);
    const h2 = 5 + (subSeed % 6);
    const h3 = 3 + (subSeed % 4);

    ctx.strokeStyle = 'rgb(78,156,97)';
    ctx.lineWidth = 1.5;

    // 每根草葉各有自己的相位偏移，製造不規則感
    const phaseOffset = (subSeed % 13) * 0.48;
    // 搖晃頻率高、幅度大、各葉方向略不同
    const shakeFreq = 18 + (subSeed % 7) * 2;   // 高頻
    const shakeMag  = shakeAmt * (8 + (subSeed % 5) * 1.5);
    const shakeX = Math.sin(wavePhase * shakeFreq + phaseOffset) * shakeMag;
    const wind = baseWind + shakeX;

    ctx.beginPath();
    ctx.moveTo(px - 2, py);
    ctx.lineTo(px - 4 + wind * 0.6, py - h1);
    ctx.moveTo(px, py);
    ctx.lineTo(px + wind, py - h2);
    ctx.moveTo(px + 2, py);
    ctx.lineTo(px + 4 + wind * 0.6, py - h3);
    ctx.stroke();
  }
}


function seedFromString(str) {
  let h = 0; for (let i = 0; i < str.length; i++) h = Math.imul(31,h) + str.charCodeAt(i) | 0;
  return h >>> 0;
}
function makePRNG(seed) {
  let s = seed; return () => {
    s |= 0; s = s + 0x6D2B79F5 | 0; let t = Math.imul(s ^ s>>>15, 1|s);
    t = t + Math.imul(t ^ t>>>7, 61|t) ^ t; return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}
function smoothstep(t) { return t*t*(3-2*t); }
function lerp(a,b,t) { return a+(b-a)*t; }
function buildNoise2D(rng, size) {
  const g = Array.from({length:size}, ()=>Array.from({length:size}, ()=>rng()*2-1));
  return (x,y) => {
    const xi=Math.floor(x)%size, yi=Math.floor(y)%size, xf=x-Math.floor(x), yf=y-Math.floor(y);
    const xi1=(xi+1)%size, yi1=(yi+1)%size;
    return lerp(lerp(g[yi][xi],g[yi][xi1],smoothstep(xf)),lerp(g[yi1][xi],g[yi1][xi1],smoothstep(xf)),smoothstep(yf));
  };
}

function generateMap(seedStr) {
  const n1=buildNoise2D(makePRNG(seedFromString(seedStr+'A')),16);
  const n2=buildNoise2D(makePRNG(seedFromString(seedStr+'B')),8);
  const n3=buildNoise2D(makePRNG(seedFromString(seedStr+'C')),32);
  return Array.from({length:ROWS},(_,gy)=>
    Array.from({length:COLS},(_,gx)=>{
      const n=n1(gx*.18,gy*.18)*.55+n2(gx*.35,gy*.35)*.25+n3(gx*.08,gy*.08)*.20;
      const h=((gx-gy)/(COLS+ROWS))*1.8+n*0.7;
      return h<-0.65?-1:h<-0.20?0:h<0.20?1:h<0.70?2:3;
    }));
}

function applySeedStr(seedStr) {
  seedStr=seedStr.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,5).padEnd(5,'0');
  currentSeed=seedStr; document.getElementById('seed-input').value=seedStr;
  MAP=generateMap(seedStr); footprints.length=0; ripples.length=0; surfaceBubbles.length=0;
  splashDrops.length=0; bodyDroplets.length=0; bodyDripActive=false;
  trampledGrass.clear(); buildPebbles(); spawnFishesOnMap();
  let sx=Math.floor(COLS*.55), sy=Math.floor(ROWS*.45);
  outer: for (let r=0;r<Math.max(ROWS,COLS);r++) {
    for (let dy=-r;dy<=r;dy++) for (let dx=-r;dx<=r;dx++) {
      if (Math.abs(dx)!==r&&Math.abs(dy)!==r) continue;
      if (tileAt(sx+dx, sy+dy)===1||tileAt(sx+dx, sy+dy)===2) { sx+=dx; sy+=dy; break outer; }
    }
  }
  player.gx=sx; player.gy=sy; player.tx=sx; player.ty=sy;
}

function randomSeed() { applySeedStr(Array.from({length:5},()=>'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[Math.floor(Math.random()*36)]).join('')); }
function applySeed()  { applySeedStr(document.getElementById('seed-input').value); }
function generateBiasedSeed(t) {
  let bS='', mC=-1; for(let i=0;i<30;i++){
    let ts=Array.from({length:5},()=>'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[Math.floor(Math.random()*36)]).join('');
    let tm=generateMap(ts), c=0; for(let r=0;r<ROWS;r++) for(let col=0;col<COLS;col++) if(tm[r][col]===t) c++;
    if(c>mC){mC=c;bS=ts;}
  }
  applySeedStr(bS);
}

function tileAt(gx,gy) { if(gx<0||gy<0||gx>=COLS||gy>=ROWS) return -2; return MAP[gy]?MAP[gy][gx]:-2; }
function isWalkable(gx,gy) { return tileAt(gx,gy)>=-1; }
function mapOrigin() { return { ox:canvas.width/2.1, oy:Math.floor((canvas.height-(COLS+ROWS)*HH)/2)+45 }; }
function toScreen(fx,fy,type) {
  const {ox,oy}=mapOrigin(); return { x:ox+(fx-fy)*HW, y:oy+(fx+fy)*HH-(ELEV[String(type)]??0) };
}

let wavePhase=0;
function drawTile(gx,gy) {
  const type=tileAt(gx,gy); if(type===-2) return;
  const p=toScreen(gx,gy,type), thick=getThick(type);
  ctx.beginPath(); ctx.moveTo(p.x,p.y-HH); ctx.lineTo(p.x+HW,p.y); ctx.lineTo(p.x,p.y+HH); ctx.lineTo(p.x-HW,p.y); ctx.closePath();
  if(type===-1){ ctx.fillStyle=`rgb(${13+Math.sin(wavePhase+gx*.7+gy*.5)*10},${26+Math.sin(wavePhase+gx*.7+gy*.5)*20},${71+Math.sin(wavePhase+gx*.7+gy*.5)*10})`; }
  else if(type===0){ ctx.fillStyle=`rgb(28,${Math.floor(150+Math.sin(wavePhase*1.2+gx*.9-gy*.6)*12)},${Math.floor(195+Math.sin(wavePhase*1.2+gx*.9-gy*.6)*12)})`; }
  else { ctx.fillStyle=COLOR[String(type)].top; }
  ctx.fill();
  if(type===2) drawGrassOnTile(gx, gy, p);
  if(type===3) drawPebbles(gx, gy, p);
  if(type>=1) drawFootprints(gx,gy);
  if(type===0) drawRipplesAt(gx, gy, p);
  if(type===-1||type===0) drawSurfaceBubblesAt(gx, gy, p);
  if(type===-1) drawSplashDropsAt(gx, gy);
  ctx.beginPath(); ctx.moveTo(p.x-HW,p.y); ctx.lineTo(p.x,p.y+HH); ctx.lineTo(p.x,p.y+HH+thick); ctx.lineTo(p.x-HW,p.y+thick); ctx.closePath(); ctx.fillStyle=COLOR[String(type)].left; ctx.fill();
  ctx.beginPath(); ctx.moveTo(p.x+HW,p.y); ctx.lineTo(p.x,p.y+HH); ctx.lineTo(p.x,p.y+HH+thick); ctx.lineTo(p.x+HW,p.y+thick); ctx.closePath(); ctx.fillStyle=COLOR[String(type)].right; ctx.fill();
}

function drawPlayer(gx,gy,frame) {
  const p=toScreen(gx,gy,tileAt(Math.round(gx),Math.round(gy)));
  const isMoving=Math.abs(player.tx-player.gx)>0.01||Math.abs(player.ty-player.gy)>0.01;
  const bob=isMoving?Math.sin(frame*.18)*2.5:0;
  ctx.save(); ctx.globalAlpha=0.22; ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(p.x,p.y,14,5,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  if(!playerSprite.complete||SPRITE_FRAME_W===0) return;
  const fi=isMoving?Math.floor(frame/6)%SPRITE_COLUMNS:0, dh=80, dw=(SPRITE_FRAME_W/SPRITE_FRAME_H)*dh;
  const type=tileAt(Math.round(gx),Math.round(gy));
  if(type===0||type===-1){
    const sd=(type===-1)?40:10, wy=p.y-0.2+(type===-1?-5:0);
    ctx.save(); ctx.beginPath(); ctx.rect(0,0,canvas.width,wy); ctx.clip();
    ctx.imageSmoothingEnabled=false; ctx.drawImage(playerSprite,fi*SPRITE_FRAME_W,player.dir*SPRITE_FRAME_H,SPRITE_FRAME_W,SPRITE_FRAME_H,p.x-dw/2,p.y-bob-dh+10+sd,dw,dh);
    ctx.restore();
  } else {
    ctx.save(); ctx.imageSmoothingEnabled=false; ctx.drawImage(playerSprite,fi*SPRITE_FRAME_W,player.dir*SPRITE_FRAME_H,SPRITE_FRAME_W,SPRITE_FRAME_H,p.x-dw/2,p.y-bob-dh+10,dw,dh);
    ctx.restore();
  }
}

const player={gx:12,gy:8,tx:12,ty:8,frame:0,dir:1};
const held=new Set();
window.addEventListener('keydown', e => {
  // 如果視窗正在顯示 (prompting 為 true)
  if (prompting) {
    if (e.key === 'Enter') {
      // 觸發「是」的按鈕點擊事件
      document.getElementById('btn-yes').click();
      e.preventDefault();
      return;
    }
    if (e.key === 'Escape') {
      // 觸發「暫時不要」的按鈕點擊事件
      document.getElementById('btn-no').click();
      e.preventDefault();
      return;
    }
  }

  // 原有的遊戲移動邏輯
  held.add(e.key);
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup',e=>held.delete(e.key));

// ── 滑鼠 / 觸控點擊移動 ──────────────────────────────────
// 將螢幕座標（canvas邏輯座標）反推為等角格子座標
function screenToIso(sx, sy) {
  const {ox, oy} = mapOrigin();
  // 取玩家當前格高度作為參考基準
  const refType = tileAt(Math.round(player.gx), Math.round(player.gy));
  const elev = ELEV[String(refType)] ?? 0;
  // 等角公式反解：
  //   sx = ox + (gx - gy) * HW  →  gx - gy = (sx - ox) / HW
  //   sy = oy + (gx + gy) * HH - elev  →  gx + gy = (sy - oy + elev) / HH
  const adjY = sy - oy + elev;
  const diffX = (sx - ox) / HW;   // gx - gy
  const sumXY = adjY / HH;        // gx + gy
  return {
    gx: (diffX + sumXY) / 2,
    gy: (sumXY - diffX) / 2
  };
}

// 根據點擊的等角座標，決定應往哪個方向走一格
function moveTowardIso(isoX, isoY) {
  if (prompting) return;
  // 相對於玩家目前目標格的偏移
  const dx = isoX - player.tx;
  const dy = isoY - player.ty;
  if (Math.abs(dx) < 0.001 && Math.abs(dy) < 0.001) return;

  // 等角座標中四個方向：
  //   dir 0 (right/東北): gx+1, gy-0  → dx>0, dy<0
  //   dir 1 (down/東南):  gx+1, gy+0  → dx>0, dy>0  (實際上 gx↑ = 往右下)
  //   dir 2 (left/西南):  gx-0, gy+1  → dx<0, dy>0
  //   dir 3 (up/西北):    gx-1, gy+0  → dx<0, dy<0
  // 以 45° 分界線切四象限，再挑主要軸
  let stepX = 0, stepY = 0;
  if (Math.abs(dx) >= Math.abs(dy)) {
    stepX = dx > 0 ? 1 : -1;
  } else {
    stepY = dy > 0 ? 1 : -1;
  }

  // 對應 WASD 方向定義：W=(-1,0)dir3, S=(1,0)dir1, A=(0,1)dir2, D=(0,-1)dir0
  if      (stepX === -1) player.dir = 3;
  else if (stepX ===  1) player.dir = 1;
  else if (stepY ===  1) player.dir = 2;
  else if (stepY === -1) player.dir = 0;

  const nx = player.tx + stepX;
  const ny = player.ty + stepY;

  if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) {
    if (boundaryCooldown <= 0) triggerTransitionPrompt(player.tx, player.ty);
    return;
  }
  if (!isWalkable(nx, ny)) return;

  const cT = tileAt(player.tx, player.ty), nT = tileAt(nx, ny);
  if (cT === 0  && nT === -1) addSplash(nx, ny);
  if (cT === -1 && nT ===  0) startBodyDrip(1.0);
  if (cT === 0  && nT ===  1) startBodyDrip(0.65);
  if ((cT === 0 || cT === -1) && nT >= 1) footprintBudget = FOOTPRINT_COUNT;
  if (footprintBudget > 0 && nT >= 1) { addFootprint(nx, ny, stepFoot, player.dir); stepFoot = 1 - stepFoot; footprintBudget--; }
  if (nT === 0) addRipple(nx, ny);
  if (nT === 2) trampleGrass(nx, ny);
  player.tx = nx; player.ty = ny;
}

// 取得事件在 canvas 邏輯座標中的位置（處理CSS縮放）
function getCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    sx: (clientX - rect.left) * scaleX,
    sy: (clientY - rect.top)  * scaleY
  };
}

// 點擊冷卻：避免長按/快速連點造成快速連移（每次移動等插值接近才允許下一步）
canvas.addEventListener('click', e => {
  // 若正在插值移動中，忽略點擊（避免連點快速移動）
  if (Math.abs(player.tx - player.gx) > 0.3 || Math.abs(player.ty - player.gy) > 0.3) return;
  if (prompting) return;
  const {sx, sy} = getCanvasPos(e.clientX, e.clientY);
  const iso = screenToIso(sx, sy);
  moveTowardIso(iso.gx, iso.gy);
});

// 觸控支援（touchend，避免與 scroll 衝突）
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (Math.abs(player.tx - player.gx) > 0.3 || Math.abs(player.ty - player.gy) > 0.3) return;
  if (prompting) return;
  const touch = e.changedTouches[0];
  const {sx, sy} = getCanvasPos(touch.clientX, touch.clientY);
  const iso = screenToIso(sx, sy);
  moveTowardIso(iso.gx, iso.gy);
}, { passive: false });

// 防止觸控時頁面滾動
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });
// ─────────────────────────────────────────────────────────

let prompting=false, boundaryCooldown=0;
function triggerTransitionPrompt(cx,cy){
  prompting=true; held.clear();
  const modal=document.getElementById('transition-modal'); modal.style.display='block';
  document.getElementById('btn-yes').onclick=()=>{ modal.style.display='none'; prompting=false; generateBiasedSeed(MAP[cy][cx]); };
  document.getElementById('btn-no').onclick=()=>{ modal.style.display='none'; prompting=false; boundaryCooldown=60; };
}

function update(){
  player.gx+=(player.tx-player.gx)*0.28; player.gy+=(player.ty-player.gy)*0.28;
  if(boundaryCooldown>0) boundaryCooldown--;
  if(!prompting&&!(Math.abs(player.tx-player.gx)>0.15||Math.abs(player.ty-player.gy)>0.15)){
    let dx=0, dy=0;
    if(held.has('ArrowUp')||held.has('w')){dx=-1;dy=0;player.dir=3;}
    else if(held.has('ArrowDown')||held.has('s')){dx=1;dy=0;player.dir=1;}
    else if(held.has('ArrowLeft')||held.has('a')){dx=0;dy=1;player.dir=2;}
    else if(held.has('ArrowRight')||held.has('d')){dx=0;dy=-1;player.dir=0;}
    if(dx!==0||dy!==0){
      const nx=player.tx+dx, ny=player.ty+dy;
      if(nx<0||ny<0||nx>=COLS||ny>=ROWS){ if(boundaryCooldown<=0) triggerTransitionPrompt(player.tx,player.ty); }
      else if(isWalkable(nx,ny)){
        const cT=tileAt(player.tx,player.ty), nT=tileAt(nx,ny);
        if(cT===0 && nT===-1) addSplash(nx, ny);
        if(cT===-1 && nT===0) startBodyDrip(1.0);
        if(cT===0 && nT===1) startBodyDrip(0.65);
        if((cT===0||cT===-1)&&nT>=1) footprintBudget=FOOTPRINT_COUNT;
        if(footprintBudget>0&&nT>=1){ addFootprint(nx,ny,stepFoot,player.dir); stepFoot=1-stepFoot; footprintBudget--; }
        if(nT===0) addRipple(nx,ny); if(nT===2) trampleGrass(nx,ny);
        player.tx=nx; player.ty=ny;
      }
    }
  }
  const curT=tileAt(Math.round(player.gx), Math.round(player.gy));
  if (curT===-1 && player.frame%30===0) {
    let fx=0,fy=0; if(player.dir===0)fy=-1;else if(player.dir===1)fx=1;else if(player.dir===2)fy=1;else fx=-1;
    if(tileAt(Math.round(player.gx)+fx,Math.round(player.gy)+fy)<1) surfaceBubbles.push({gx:Math.round(player.gx)+fx, gy:Math.round(player.gy)+fy, ox:Math.random()*30-15, oy:Math.random()*10-5, r:1+Math.random()*2, alpha:1, born:performance.now(), life:1200+Math.random()*800});
  }
  player.frame++; wavePhase+=0.04; const now=performance.now();
  updateFootprints(now); updateRipples(now); updateSurfaceBubbles(); updateSplashDrops(now); updateBodyDroplets(now); updateFishes(now);
}

function render(){
  const sg=ctx.createLinearGradient(0,0,0,canvas.height*.6); sg.addColorStop(0,'#0f2744'); sg.addColorStop(1,'#2e6080');
  ctx.fillStyle=sg; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let s=0;s<ROWS+COLS-1;s++) for(let gx=0;gx<COLS;gx++){ let gy=s-gx; if(gy>=0&&gy<ROWS) drawTile(gx,gy); }
  drawAllFishes(); drawPlayer(player.gx,player.gy,player.frame); drawBodyDroplets();
}

randomSeed();
(function loop(){ update(); render(); requestAnimationFrame(loop); })();
</script>
